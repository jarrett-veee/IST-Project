<!DOCTYPE html>
<html>
<head>
  <title>CRUD Demo</title>
  <style>
    body { font-family: Arial; margin: 40px; max-width: 800px; }
    h1 { margin-bottom: 20px; }
    .form-section, .list-section { margin-bottom: 40px; }
    label { display: block; margin-top: 10px; }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    ul { padding: 0; }
    li {
      list-style: none;
      padding: 10px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .error { color: red; margin-top: 10px; }
  </style>
</head>

<body>

  <h1>Item Manager</h1>

  <!-- FORM SECTION -->
  <div class="form-section">
    <h2>Add / Edit Item</h2>

    <form id="form">
      <input id="id" type="hidden">

      <label>Name (required)</label>
      <input id="name" placeholder="Enter item name">

      <label>Description</label>
      <textarea id="desc" placeholder="Enter item description"></textarea>

      <button type="submit">Save Item</button>
      <div id="error" class="error"></div>
    </form>
  </div>

  <!-- LIST SECTION -->
  <div class="list-section">
    <h2>Items</h2>
    <ul id="list"></ul>
  </div>

  <script src="api.js"></script>
  <script>
    const list = document.getElementById("list");
    const form = document.getElementById("form");
    const id = document.getElementById("id");
    const name = document.getElementById("name");
    const desc = document.getElementById("desc");
    const error = document.getElementById("error");

    function render() {
      list.innerHTML = "";
      ItemApi.getItems().forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div>
            <strong>${item.name}</strong><br>
            ${item.description}
          </div>
          <div>
            <button onclick="edit('${item.id}')">Edit</button>
            <button onclick="del('${item.id}')">Delete</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function edit(itemId) {
      const item = ItemApi.getItems().find(i => i.id === itemId);
      id.value = item.id;
      name.value = item.name;
      desc.value = item.description;
    }

    function del(itemId) {
      ItemApi.deleteItem(itemId);
      render();
    }

    form.addEventListener("submit", e => {
      e.preventDefault();
      error.textContent = "";

      try {
        if (id.value) {
          ItemApi.updateItem(id.value, { name: name.value, description: desc.value });
        } else {
          ItemApi.createItem({ name: name.value, description: desc.value });
        }

        id.value = "";
        name.value = "";
        desc.value = "";
        render();

      } catch (err) {
        error.textContent = err.message;
      }
    });

    render();
  </script>

</body>
</html>
